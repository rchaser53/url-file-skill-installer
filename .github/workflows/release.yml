name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_TYPE: ${{ matrix.archive }}
          VERSION: ${{ github.ref_name }}
          BINARY_NAME: codex-skills-installer
        run: |
          set -euo pipefail
          mkdir -p dist

          artifact_base="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="${artifact_base}"
          binary_path="${package_dir}/${BINARY_NAME}"

          if [ "${GOOS}" = "windows" ]; then
            binary_path="${binary_path}.exe"
          fi

          mkdir -p "${package_dir}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${binary_path}" .

          if [ "${ARCHIVE_TYPE}" = "zip" ]; then
            (cd "${package_dir}" && zip -r "../dist/${artifact_base}.zip" .)
          else
            tar -C "${package_dir}" -czf "dist/${artifact_base}.tar.gz" .
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
